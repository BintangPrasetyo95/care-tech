<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CARE-TECH: An anti-bullying narrative RPG set in Harmonia School. Build empathy, protect friends, and raise the Harmony Index." />
  <title>CARE-TECH: Harmonia School</title>
  <link rel="icon" href="assets/logo-care-tech.png" />
  <style>
    /* ── Reset & full-bleed canvas ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #e8faff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas {
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ══════════ Pre-game loading screen ══════════ */
    #preloader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #ddecec 0%, #0f1011 100%);
      z-index: 9999;
      transition: opacity 1.2s ease-in-out, visibility 1.2s;
    }
    #preloader.hidden { 
      opacity: 0; 
      visibility: hidden;
    }
    #preloader h1 {
      font-size: 2.2rem; 
      color: #3b65c7; 
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    #preloader h1 span { 
      font-weight: 600;
      background: linear-gradient(90deg, #0ea5e9, #2cb67d);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #preloader p {
      color: #64748b; font-size: 0.95rem; margin-bottom: 3rem;
      font-weight: 400; letter-spacing: 0.05em;
    }
    
    .loader-orb {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #34d399);
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4), inset 0 0 10px rgba(255,255,255,0.8);
      animation: orbPulse 2s ease-in-out infinite alternate;
    }
    @keyframes orbPulse {
      0% {
        transform: scale(0.95) translateY(0px);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.2), inset 0 0 8px rgba(255,255,255,0.6);
      }
      100% {
        transform: scale(1.05) translateY(-5px);
        box-shadow: 0 0 35px rgba(52, 211, 153, 0.5), inset 0 0 15px rgba(255,255,255,0.9);
      }
    }
  </style>
</head>
<body>

  <!-- Pre-loader shown while scripts download -->
  <div id="preloader">
    <img src="assets/logo-care-tech-with-text.png" alt="CareTech Logo" style="max-width: 300px; margin-bottom: 2rem;">
    <div class="loader-orb"></div>
  </div>

  <!-- Phaser 3 engine (pinned version for reproducibility) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game modules — loaded in strict dependency order -->
  <script src="js/data/dialogues.js"></script>
  <script src="js/systems/RelationshipManager.js"></script>
  <script src="js/systems/DialogueManager.js"></script>
  <script src="js/systems/ScheduleManager.js"></script>
  <script src="js/entities/Player.js"></script>
  <script src="js/entities/NPC.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/WorldScene.js"></script>
  <script src="js/scenes/UIScene.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
