<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareTech - Jurnal Harian</title>
    <link rel="icon" href="assets/logo-care-tech.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo-care-tech.png" alt="CareTech Logo" class="sidebar-logo">
                <h2>CareTech</h2>
            </div>
            
            <div class="sidebar-section">
                <h3 class="section-title">Menu Utama</h3>
                <ul class="sidebar-menu">
                    <li class="menu-item ">
                        <a href="dashboard.html">
                            <span class="icon">🏠</span>
                            <span class="text">Beranda</span>
                        </a>
                    </li>
                    <li class="menu-item active">
                        <a href="jurnal.html">
                            <span class="icon">📓</span>
                            <span class="text">Jurnal Harian</span>
                        </a>
                    </li>
                    <li class="menu-item ">
                        <a href="penilaian.html">
                            <span class="icon">⭐️</span>
                            <span class="text">Penilaian</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-section hiburan-section">
                <h3 class="section-title">Eksplorasi</h3>
                <ul class="sidebar-menu">
                    <li class="menu-item ">
                        <a href="komik.html">
                            <span class="icon">📖</span>
                            <span class="text">Komik Digital</span>
                        </a>
                    </li>
                    <li class="menu-item ">
                        <a href="modul.html">
                            <span class="icon">📚</span>
                            <span class="text">Modul Digital</span>
                        </a>
                    </li>
                    <li class="menu-item has-dropdown ">
                        <a href="javascript:void(0)" class="dropdown-toggle" onclick="this.parentElement.classList.toggle('active-dropdown')">
                            <span class="icon">🎮</span>
                            <span class="text">Game</span>
                            <span class="dropdown-icon" style="margin-left: auto; font-size: 0.8rem;">▼</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a href="pretest.html">Pretest</a></li>
                            <li><a href="game.html">Game</a></li>
                            <li><a href="posttest.html">Posttest</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
</nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="greeting">
                    <h1>Jurnal Harian 📓</h1>
                    <p>Catatan perasaan dan refleksimu setiap hari.</p>
                </div>
                <div class="user-profile">
                    <div class="avatar">🧑‍🎓</div>
                </div>
            </header>

            <div class="content-grid">
                <div class="dashboard-card wide-card glass-panel" id="jurnal-list">
                    <h3>Riwayat Jurnal</h3>
                    <!-- Jurnal items will be injected here via JS -->
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listDiv = document.getElementById('jurnal-list');
            const allReflections = JSON.parse(localStorage.getItem('caretech_reflections') || '[]');

            if(allReflections.length === 0) {
                listDiv.innerHTML += `<p>Belum ada catatan jurnal. Mulailah dengan mengisi refleksi harian!</p>`;
                return;
            }

            allReflections.reverse().forEach(ref => {
                const date = new Date(ref.date).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                let emoji = "😐";
                if(ref.feeling === "senang") emoji = "😃";
                if(ref.feeling === "sedih") emoji = "😔";
                if(ref.feeling === "marah") emoji = "😠";

                const notesHtml = ref.feeling_notes ? `<p style="margin-top:0.5rem; color:#666;"><em>"${ref.feeling_notes}"</em></p>` : '';

                const html = `
                    <div style="border: 1px solid #Eef2f5; padding: 1.5rem; border-radius: 15px; margin-bottom: 1rem; background: #fafafa;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                            <span style="font-weight:bold; color:var(--primary-color);">${date}</span>
                            <span style="font-size:1.5rem;">${emoji}</span>
                        </div>
                        <p><strong>Perasaan:</strong> ${ref.feeling.charAt(0).toUpperCase() + ref.feeling.slice(1)}</p>
                        ${notesHtml}
                    </div>
                `;
                listDiv.innerHTML += html;
            });
        });
    </script>
</body>
</html>
