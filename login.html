<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareTech - Login</title>
    <link rel="icon" href="assets/logo-care-tech.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="landing.css">
    <style>
        .login-section {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 8rem 5% 3rem 5%;
            background: linear-gradient(to right, rgba(15, 44, 89, 0.8), rgba(15, 44, 89, 0.8)), url('https://images.unsplash.com/photo-1758273241086-f3585ef8c2f8?q=80&w=1631&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 10;
        }

        .login-section::before, .login-section::after {
            content: "";
            flex: 1;
        }
        
        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 2rem auto;
            padding: 3rem 2rem;
        }

        .login-card h2 {
            margin-bottom: 2rem;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        @media (max-width: 600px) {
            .login-section {
                padding: 6rem 5% 2rem 5%;
            }
            .login-card {
                padding: 2rem 1.5rem;
            }
            .login-card h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape circle1"></div>
        <div class="shape circle2"></div>
        <div class="shape circle3"></div>
        <div class="shape circle4"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="assets/logo-care-tech.png" alt="CareTech Logo" class="nav-logo">
            <span class="nav-brand">CareTech</span>
        </a>
    </nav>

    <!-- Login Section -->
    <section class="login-section">
        <div class="glass-card login-card">
            <h2>Masuk</h2>
            <form action="reflection.html" method="GET">
                <div class="form-group">
                    <label for="nisn">NISN</label>
                    <input type="text" id="nisn" name="nisn" placeholder="Masukkan NISN">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan Password">
                </div>
                <button type="submit" class="btn-start btn-submit">Masuk</button>
            </form>
        </div>
    </section>
</body>
</html>
